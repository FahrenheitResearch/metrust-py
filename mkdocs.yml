site_name: metrust
site_description: Rust-powered meteorology toolkit with a MetPy-compatible calculation layer
site_url: https://fahrenheitresearch.github.io/metrust-py/
repo_url: https://github.com/FahrenheitResearch/metrust-py
repo_name: FahrenheitResearch/metrust-py

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FahrenheitResearch/metrust-py

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guides/installation.md
    - Migration from MetPy: guides/migration.md
    - Array Support: guides/arrays.md
  - API Reference:
    - Thermodynamics: api/thermodynamics.md
    - Moisture & Humidity: api/moisture.md
    - Wind: api/wind.md
    - Kinematics: api/kinematics.md
    - Severe Weather: api/severe.md
    - Grid Composites: api/grid-composites.md
    - Smoothing & Interpolation: api/smoothing.md
    - Atmospheric: api/atmospheric.md
    - I/O: api/io.md
    - Units & Constants: api/units.md
  - Tutorials:
    - Weather Data 101: tutorials/weather-101.md
    - Your First Sounding: tutorials/first-sounding.md
    - Your First Grid Analysis: tutorials/first-grid.md
    - Reading the Numbers: tutorials/reading-the-numbers.md
    - Recipes & Workflows: tutorials/recipes.md
  - Methodology:
    - Overview: methodology/index.md
    - Thermodynamics: methodology/thermodynamics.md
    - Wind: methodology/wind.md
    - Grid Kinematics: methodology/grid-kinematics.md
    - Smoothing: methodology/smoothing.md
    - Severe Weather: methodology/severe-weather.md
    - Interpolation: methodology/interpolation.md
    - Moisture: methodology/moisture.md
    - Units and Pint: methodology/units.md
    - MetPy Compatibility: methodology/metpy-compat.md
    - Parallelism: methodology/parallelism.md
    - Architecture: methodology/architecture.md
    - I/O Formats: methodology/io-formats.md
  - Performance: performance.md
  - Compatibility: compatibility.md
  - Delegation Ledger: delegation-ledger.md
