name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." pytest numpy pint

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Python compatibility tests
        run: python -m pytest tests/test_python_compat.py -q

  bench-rust:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benchmarks
        run: cargo bench --package metrust --bench calc_bench

      - name: Upload criterion artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-report
          path: target/criterion/
          retention-days: 30

  bench-python:
    name: Python Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install metrust and MetPy
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." numpy pint metpy

      - name: Run three-tier benchmark
        run: python benches/bench_python.py --json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-bench-results
          path: bench_results.json
          retention-days: 30
