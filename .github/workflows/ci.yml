name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  METPY_VERSION: "1.7.1"

jobs:
  smoke:
    name: Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." pytest numpy pint

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Python compatibility tests
        run: python -m pytest tests/test_python_compat.py -q

  differential:
    name: Differential (${{ matrix.mode }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        mode: ["metrust-only", "metpy", "metpy-xarray"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." pytest numpy pint pandas
          if [[ "${{ matrix.mode }}" != "metrust-only" ]]; then
            python -m pip install "MetPy==${METPY_VERSION}"
          fi
          if [[ "${{ matrix.mode }}" == "metpy-xarray" ]]; then
            python -m pip install xarray
          fi

      - name: Run differential test mode
        run: python tests/run_ci_mode.py ${{ matrix.mode }}

  bench-rust:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benchmarks
        run: cargo bench --package metrust --bench calc_bench

      - name: Upload criterion artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: criterion-report
          path: target/criterion/
          retention-days: 30

  bench-python:
    name: Python Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install metrust and MetPy
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." numpy pint "MetPy==${METPY_VERSION}"

      - name: Run three-tier benchmark
        run: python benches/bench_python.py --json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-bench-results
          path: bench_results.json
          retention-days: 30

  bench-workflows:
    name: Workflow Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install metrust, MetPy, and workflow deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." numpy pint pandas xarray "MetPy==${METPY_VERSION}"

      - name: Run workflow replay benchmarks
        run: python benches/bench_workflows.py --json --json-file workflow_bench_results.json

      - name: Upload workflow benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: workflow-bench-results
          path: workflow_bench_results.json
          retention-days: 30
