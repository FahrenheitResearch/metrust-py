[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "metrust"
version = "0.1.2"
description = "Rust-powered meteorology toolkit for Python"
requires-python = ">=3.9"
dependencies = ["numpy>=1.20", "pint>=0.20"]

[tool.maturin]
python-source = "python"
module-name = "metrust._metrust"
features = ["pyo3/extension-module"]
